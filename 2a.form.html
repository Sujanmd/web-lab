<!DOCTYPE html>
<html>
<head>
    <title>Student Feedback Form</title>
</head>

<body>

<h2 align="center">Student Feedback Form</h2>

<form align="center">

    Name:
    <input type="text"><br><br>

    Email:
    <input type="email"><br><br>

    USN:
    <input type="text"><br><br>

    Semester:
    <select>
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
        <option>5</option>
        <option>6</option>
        <option>7</option>
        <option>8</option>
    </select>

    <br><br>

    Branch:
    <input type="radio" name="branch">CSE
    <input type="radio" name="branch">ISE
    <input type="radio" name="branch">ECE

    <br><br>

    Feedback:
    <br>
    <textarea rows="4" cols="30"></textarea>

    <br><br>

    <input type="checkbox">
    Send me a copy

    <br><br>

    <input type="submit" value="Submit">

</form>

</body>
</html>
