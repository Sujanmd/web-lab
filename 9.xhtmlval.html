<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN"
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">

<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Registration Form</title>

    <script type="text/javascript">
    function validate() {
        var uid = document.getElementById("uid").value;
        var name = document.getElementById("name").value;
        var pass = document.getElementById("pass").value;
        var email = document.getElementById("email").value;

        if (uid.length < 5 || uid.length > 12) {
            alert("User ID must be 5-12 characters");
            return;
        }

        if (name.length < 15 || !/^[A-Za-z ]+$/.test(name)) {
            alert("Name must contain only alphabets and be at least 15 characters");
            return;
        }

        if (!/^(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*]).{8,}$/.test(pass)) {
            alert("Invalid Password");
            return;
        }

        if(email.includes("@") && email.includes(".")) {
            alert("Invalid Email");
            return;
        }

        alert("Registration Successful");
    }
    </script>
</head>

<body>
    <h2>Registration Form</h2>

    <form action="#">
        User ID:
        <input type="text" id="uid" /><br /><br />

        Name:
        <input type="text" id="name" /><br /><br />

        Password:
        <input type="password" id="pass" /><br /><br />

        Email:
        <input type="text" id="email" /><br /><br />

        <input type="button" value="Submit" onclick="validate()" />
    </form>
</body>
</html>
